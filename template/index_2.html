<!doctype html>
<html lang="it">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trainer Interattivo d'Esame</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Newsreader:ital,opsz,wght@0,6..72,400..600;1,6..72,400..500&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <link rel="stylesheet" href="css/style_2.css">
</head>

<body>
    <div class="ambient"></div>
    <div class="grid"></div>

    <header class="masthead">
        <div class="masthead-in">
            <div class="brand">
                <span class="mark">
                    <svg width="28" height="32" viewBox="0 0 32 36" fill="none">
                        <rect x="3" y="3" width="26" height="6.5" rx="2" stroke="var(--signal)" stroke-width="2" />
                        <rect x="3" y="14" width="26" height="6.5" rx="2" stroke="var(--cream)" stroke-width="1.5"
                            opacity=".7" />
                        <rect x="3" y="25" width="26" height="6.5" rx="2" stroke="var(--cream)" stroke-width="1.5"
                            opacity=".4" />
                    </svg>
                </span>
                <span class="title"><span class="kick">Autonomo</span>
                    <h1>Quiz App</h1>
                </span>
            </div>

            <div class="stats-hud">
                <div class="hud-item"><span class="val" id="hudTot">0%</span><span class="lbl">Progresso</span></div>
                <div class="hud-item"><span class="val ok" id="hudOk">0</span><span class="lbl">Corrette</span></div>
                <div class="hud-item"><span class="val no" id="hudNo">0</span><span class="lbl">Errate</span></div>
            </div>
        </div>
    </header>

    <div class="scene">
        <div class="shell">
            <aside class="rail">
                <div class="panel">
                    <span class="eyebrow">Navigazione Moduli</span>
                    <nav class="stack" id="stack"></nav>
                </div>
                <div class="panel">
                    <span class="eyebrow">Filtri e Opzioni</span>
                    <div class="segmented" id="fmtChips"></div>
                    <div class="switches">
                        <label class="switch"><input type="checkbox" id="togReview"><span>Solo da
                                rivedere</span></label>
                        <label class="switch"><input type="checkbox" id="togShuffle"><span>Mescola ordine</span></label>
                        <button class="reset" id="retryBtn">Riprova Errori</button>
                        <button class="reset" id="resetBtn">Reset Progressi Totale</button>
                    </div>
                </div>
            </aside>
            <main class="stage">
                <article class="sheet" id="card"></article>
                <div class="kbd-hint">Scorciatoie Tastiera: <span>←</span> <span>→</span> Naviga | <span>1-4</span>
                    Scelte | <span>V</span> <span>F</span> Vero/Falso | <span>Spazio</span> Rivela </div>
            </main>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        const FMT = [["all", "Tutti"], ["vf", "Vero / Falso"], ["mc", "Scelta Multipla"], ["open", "Aperte"]];
        const FMTLABEL = { vf: "Vero / Falso", mc: "Scelta Multipla", open: "Aperta" };

        const S = { chapter: "all", fmt: "all", review: false, shuffle: false, idx: 0, pool: [], _lastId: null };
        let progress = {};
        const KEY = "quiz_trainer_v2";

        function load() { try { const r = localStorage.getItem(KEY); if (r) progress = JSON.parse(r) || {}; } catch (e) { } }
        function save() { try { localStorage.setItem(KEY, JSON.stringify(progress)); } catch (e) { } }
        load();

        const $ = s => document.querySelector(s);

        // FUNZIONI PER IL MARKDOWN
        function md(txt) { return marked.parseInline(txt || ''); }
        function mdBlock(txt) { return marked.parse(txt || ''); }

        function shuffle(a) { a = a.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]]; } return a; }

        function isReview(id) {
            const p = progress[id];
            return p && (p.correct === false || p.self === "review" || p.self === "almost");
        }

        function buildPool() {
            let p = BANK.filter(q => (S.chapter === "all" || q.ch === S.chapter) && (S.fmt === "all" || q.fmt === S.fmt));
            if (S.review) {
                p = p.filter(q => {
                    const pr = progress[q.id];
                    return pr && (!pr.ok || pr.retry || pr.correct === false || pr.self === "review" || pr.self === "almost");
                });
            }
            if (S.shuffle) p = shuffle(p);
            S.pool = p; S.idx = 0;
        }

        function chapterStats(ch) {
            const qs = BANK.filter(q => q.ch === ch); let ans = 0, ok = 0;
            qs.forEach(q => { const pr = progress[q.id]; if (pr && pr.answered && !pr.retry) { ans++; if (pr.correct) ok++; } }); return { tot: qs.length, ans, ok, no: ans - ok };
        }

        function overall() {
            let ans = 0, ok = 0;
            BANK.forEach(q => { const pr = progress[q.id]; if (pr && pr.answered && !pr.retry) { ans++; if (pr.correct) ok++; } });
            return { tot: BANK.length, ans, ok, no: ans - ok };
        }

        function renderStack() {
            const el = $("#stack"); el.innerHTML = "";
            const o = overall();

            const all = document.createElement("div");
            all.className = "layer" + (S.chapter === "all" ? " on" : "");
            all.innerHTML = `<div class="layer-code">Σ</div><div class="layer-info"><span class="layer-name">Tutto il database</span><div class="layer-gauge"><i style="width:${o.tot ? Math.round(o.ans / o.tot * 100) : 0}%"></i></div></div>`;
            all.onclick = () => { S.chapter = "all"; buildPool(); renderAll(); };
            el.appendChild(all);

            if (typeof META !== 'undefined') {
                META.forEach(m => {
                    const st = chapterStats(m.ch);
                    const b = document.createElement("div");
                    b.className = "layer" + (S.chapter === m.ch ? " on" : "");
                    b.innerHTML = `<div class="layer-code">${m.num}</div><div class="layer-info"><span class="layer-name">${m.nm}</span><div class="layer-gauge"><i style="width:${st.tot ? Math.round(st.ans / st.tot * 100) : 0}%"></i></div></div>`;
                    b.onclick = () => { S.chapter = m.ch; buildPool(); renderAll(); };
                    el.appendChild(b);
                });
            }
        }

        function renderChips() {
            const el = $("#fmtChips"); el.innerHTML = "";
            FMT.forEach(([v, l]) => {
                const c = document.createElement("button");
                c.className = "seg" + (S.fmt === v ? " on" : ""); c.textContent = l;
                c.onclick = () => { S.fmt = v; buildPool(); renderAll(); }; el.appendChild(c);
            });
        }

        function renderMeter() {
            const o = overall();
            const pct = o.tot ? Math.round(o.ans / o.tot * 100) : 0;
            const t = $("#hudTot"); if (t) t.textContent = pct + "%";
            const ok = $("#hudOk"); if (ok) ok.textContent = o.ok;
            const no = $("#hudNo"); if (no) no.textContent = o.no;
        }

        function setAns(id, correct, extra) {
            let p = progress[id] || {};
            delete p.retry;
            progress[id] = Object.assign(p, { answered: true, correct: !!correct }, extra || {});
            save(); renderStack(); renderMeter();
        }

        function verdictHTML(ok) {
            return `<div class="verdict ${ok ? "ok" : "no"}">${ok ? "✓ Risposta Esatta" : "✗ Risposta Errata"}</div>`;
        }

        function renderCard() {
            const card = $("#card");
            if (!S.pool.length) {
                card.innerHTML = `<div style="text-align:center; padding: 60px 0;"><b style="font-size:1.8rem; display:block; margin-bottom:10px;">✨ Tutto pulito!</b><span style="color:var(--ink-3)">Nessuna domanda trovata per questi filtri.</span></div>`;
                S._lastId = null; return;
            }
            if (S.idx < 0) S.idx = 0; if (S.idx >= S.pool.length) S.idx = S.pool.length - 1;

            const q = S.pool[S.idx]; const pr = progress[q.id] || {};
            const m = (typeof META !== 'undefined') ? META.find(x => x.ch === q.ch) || { num: "-", nm: "Capitolo" } : { num: "-", nm: "Capitolo" };

            card.style.animation = 'none';
            card.offsetHeight;
            card.style.animation = 'slideUp 0.5s var(--ease-out) both, floatCard 6s ease-in-out infinite';

            const isAnswered = pr.answered && !pr.retry;

            let h = `<div class="sheet-meta"><span class="meta-code">${m.num} - ${m.nm}</span><span class="meta-fmt">${FMTLABEL[q.fmt] || q.fmt}</span></div><div class="prompt">${mdBlock(q.q)}</div>`;

            if (q.fmt === "vf") {
                const cls = v => { if (!isAnswered) return ""; if (v === q.correct) return " correct"; if (pr.pick === v) return " wrong"; return ""; };
                h += `<div class="choices">
                    <button class="choice${cls(true)}" data-v="true" ${isAnswered ? "disabled" : ""}><span class="choice-key">V</span> Vero</button>
                    <button class="choice${cls(false)}" data-v="false" ${isAnswered ? "disabled" : ""}><span class="choice-key">F</span> Falso</button>
                </div>`;
                h += `<div class="feedback${isAnswered ? " show" : ""}">${isAnswered ? verdictHTML(pr.correct) + `<div class="expl">${mdBlock(q.explain)}</div>` : ""}</div>`;
            } else if (q.fmt === "mc") {
                const L = ["1", "2", "3", "4", "5"];
                h += `<div class="choices">`;
                q.opts.forEach((o, i) => {
                    let c = ""; if (isAnswered) { if (i === q.correct) c = " correct"; else if (pr.pick === i) c = " wrong"; }
                    h += `<button class="choice${c}" data-i="${i}" ${isAnswered ? "disabled" : ""}><span class="choice-key">${L[i]}</span><span>${md(o)}</span></button>`;
                });
                h += `</div><div class="feedback${isAnswered ? " show" : ""}">${isAnswered ? verdictHTML(pr.correct) + `<div class="expl">${mdBlock(q.explain)}</div>` : ""}</div>`;
            } else {
                const isRevealed = pr.revealed && !pr.retry;
                if (!isRevealed) {
                    h += `<div class="choices"><button class="choice" id="revealBtn"><span class="choice-key">␣</span> Clicca o premi Spazio per rivelare</button></div>`;
                } else {
                    h += `<div class="feedback show"><div class="verdict ok">✓ Punti Chiave</div><div class="expl">${q.points ? mdBlock("- " + q.points.join("\n- ")) : (q.explain ? mdBlock(q.explain) : '')}</div></div>`;
                }
            }

            h += `<div class="pager">
                <button class="pgbtn" id="prevBtn" ${S.idx === 0 ? "disabled" : ""}>← Precedente</button>
                <span class="pager-count">Domanda ${S.idx + 1} di ${S.pool.length}</span>
                <button class="pgbtn" id="nextBtn" ${S.idx === S.pool.length - 1 ? "disabled" : ""}>Prossima →</button>
            </div>`;

            card.innerHTML = h;

            card.querySelectorAll(".choice").forEach(b => {
                if (b.dataset.v !== undefined) b.onclick = () => { const v = b.dataset.v === "true"; setAns(q.id, v === q.correct, { pick: v }); renderCard(); };
                else if (b.dataset.i !== undefined) b.onclick = () => { const i = +b.dataset.i; setAns(q.id, i === q.correct, { pick: i }); renderCard(); };
            });

            const rb = card.querySelector("#revealBtn");
            if (rb) rb.onclick = () => {
                let p = progress[q.id] || {};
                delete p.retry;
                progress[q.id] = Object.assign(p, { revealed: true }); save(); renderCard();
            };

            const pv = card.querySelector("#prevBtn"), nx = card.querySelector("#nextBtn");
            if (pv) pv.onclick = () => { S.idx--; renderCard(); };
            if (nx) nx.onclick = () => { S.idx++; renderCard(); };

            // APPLICA LE LIBRERIE DOPO AVER GENERATO L'HTML
            card.querySelectorAll('pre code').forEach((block) => hljs.highlightElement(block));
            if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) {
                MathJax.typesetPromise([card]);
            }
        }

        function renderAll() { renderStack(); renderChips(); renderMeter(); renderCard(); }

        $("#togReview").onchange = e => { S.review = e.target.checked; buildPool(); renderCard(); renderStack(); };
        $("#togShuffle").onchange = e => { S.shuffle = e.target.checked; buildPool(); renderCard(); };

        $("#retryBtn").onclick = function () {
            let hasErrors = false;
            BANK.forEach(q => {
                let p = progress[q.id];
                if (p && (p.correct === false || p.self === "review" || p.self === "almost")) {
                    p.retry = true;
                    hasErrors = true;
                }
            });
            if (hasErrors) {
                save(); $("#togReview").checked = true; S.review = true; buildPool(); renderAll();
            }
        };

        $("#resetBtn").onclick = function () {
            if (confirm("Vuoi azzerare tutti i progressi e ripartire da zero?")) {
                progress = {}; save();
                $("#togReview").checked = false; $("#togShuffle").checked = false; S.review = false; S.shuffle = false; buildPool(); renderAll();
            }
        };

        document.addEventListener("keydown", e => {
            if (["INPUT", "TEXTAREA"].includes(document.activeElement.tagName)) return;
            if (['ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();

            if (!S.pool.length) return;
            const q = S.pool[S.idx]; const pr = progress[q.id] || {};
            const isAnswered = pr.answered && !pr.retry;
            const isRevealed = pr.revealed && !pr.retry;

            if (e.key === "ArrowRight" && S.idx < S.pool.length - 1) { S.idx++; renderCard(); return; }
            if (e.key === "ArrowLeft" && S.idx > 0) { S.idx--; renderCard(); return; }

            if (q.fmt === "vf" && !isAnswered) {
                if (e.key === "v" || e.key === "V") { setAns(q.id, true === q.correct, { pick: true }); renderCard(); }
                if (e.key === "f" || e.key === "F") { setAns(q.id, false === q.correct, { pick: false }); renderCard(); }
            }
            if (q.fmt === "mc" && !isAnswered) {
                const i = parseInt(e.key, 10) - 1;
                if (i >= 0 && i < q.opts.length) { setAns(q.id, i === q.correct, { pick: i }); renderCard(); }
            }
            if ((q.fmt === "open" || q.fmt === "code")) {
                if (!isRevealed && (e.key === " " || e.code === "Space")) {
                    let p = progress[q.id] || {};
                    delete p.retry;
                    progress[q.id] = Object.assign(p, { revealed: true }); save(); renderCard();
                }
            }
        });

        if (typeof BANK !== 'undefined') { buildPool(); renderAll(); }
    </script>

    <script>

            const d = document.createElement('footer');
            d.className = 'site-credits';

            document.body.appendChild(d);
        })();
    </script>
</body>

</html>
