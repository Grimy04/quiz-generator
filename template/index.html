<!doctype html>
<html lang="it">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trainer Interattivo d'Esame</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Newsreader:ital,opsz,wght@0,6..72,400..600;1,6..72,400..500&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --ground: #100E0A;
            --ground-2: #1A1712;
            --ground-3: #231F18;
            --paper: #F3EDE0;
            --paper-2: #E7DECC;
            --paper-edge: #D6CBB1;
            --ink: #1A1712;
            --ink-2: #4A4235;
            --ink-3: #776B58;
            --cream: #ECE5D6;
            --cream-2: #A69C87;
            --cream-3: #766C59;
            --signal: #E0913A;
            --signal-2: #F4B662;
            --signal-ink: #B16C26;

            --ok: #42704C;
            --ok-bg: rgba(66, 112, 76, .14);
            --ok-glow: rgba(66, 112, 76, .45);
            --no: #A8442F;
            --no-bg: rgba(168, 68, 47, .12);
            --no-glow: rgba(168, 68, 47, .4);
            --line-d: rgba(236, 229, 214, .13);
            --line-d2: rgba(236, 229, 214, .06);
            --line-p: rgba(26, 23, 18, .16);
            --line-p2: rgba(26, 23, 18, .08);
            --card-shadow: 0 2px 5px rgba(0, 0, 0, .45), 0 22px 44px -18px rgba(0, 0, 0, .6), 0 60px 100px -50px rgba(0, 0, 0, .75);
            --display: "Bricolage Grotesque", "Hanken Grotesk", system-ui, sans-serif;
            --serif: "Newsreader", Georgia, "Times New Roman", serif;
            --mono: "Space Mono", ui-monospace, Menlo, Consolas, monospace;
            --ease: cubic-bezier(.2, .85, .25, 1);
            --ease-out: cubic-bezier(.16, 1, .3, 1);
        }

        /* {{THEME_VARIABLES}} */

        * {
            box-sizing: border-box
        }

        html,
        body {
            margin: 0
        }

        body {
            font-family: var(--serif);
            color: var(--cream);
            background: var(--ground);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        #net {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            display: block;
        }

        .grid {
            position: fixed;
            inset: -5%;
            z-index: 0;
            pointer-events: none;
            opacity: .5;
            background-image: repeating-linear-gradient(0deg, rgba(236, 229, 214, .045) 0 1px, transparent 1px 52px),
                repeating-linear-gradient(90deg, rgba(236, 229, 214, .045) 0 1px, transparent 1px 52px);
            -webkit-mask-image: radial-gradient(120% 90% at 50% 38%, rgba(0, 0, 0, .85), transparent 78%);
            mask-image: radial-gradient(120% 90% at 50% 38%, rgba(0, 0, 0, .85), transparent 78%)
        }

        .ambient {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(80% 60% at 50% 16%, color-mix(in srgb, var(--signal) 10%, transparent), transparent 60%),
                radial-gradient(120%120% at 50% 120%, rgba(0, 0, 0, .6), transparent 55%),
                radial-gradient(150% 100% at 50% 0%, transparent 40%, rgba(8, 6, 3, .55) 100%)
        }

        .masthead {
            position: sticky;
            top: 0;
            z-index: 40;
            background: color-mix(in srgb, var(--ground) 80%, transparent);
            backdrop-filter: blur(8px) saturate(1.15);
            border-bottom: 1px solid var(--line-d)
        }

        .masthead-in {
            max-width: 1240px;
            margin: 0 auto;
            padding: clamp(14px, 2.2vw, 22px) clamp(20px, 3vw, 44px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 22px
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
            min-width: 0;
            animation: rise .8s var(--ease-out) both
        }

        .mark svg {
            display: block;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, .5))
        }

        .kick {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: .28em;
            text-transform: uppercase;
            color: var(--signal);
            display: block;
            margin-bottom: 6px
        }

        .title h1 {
            font-family: var(--display);
            font-weight: 800;
            font-size: clamp(1.85rem, 4.2vw, 2.9rem);
            line-height: .9;
            letter-spacing: -.026em;
            color: var(--cream);
            margin: 0;
            text-shadow: 0 2px 24px rgba(0, 0, 0, .5)
        }

        .sub {
            font-family: var(--serif);
            font-style: italic;
            font-size: 13px;
            color: var(--cream-2);
            margin-top: 7px;
            display: block
        }

        .gauge {
            position: relative;
            display: grid;
            place-items: center;
            flex: 0 0 auto;
            width: 112px;
            height: 112px;
            animation: rise .8s .07s var(--ease-out) both
        }

        .dial {
            position: absolute;
            inset: 0
        }

        .dial-read {
            position: relative;
            text-align: center;
            line-height: 1
        }

        .dial-read span {
            font-family: var(--display);
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--cream);
            letter-spacing: -.02em
        }

        .dial-read small {
            display: block;
            font-family: var(--mono);
            font-size: 8.5px;
            letter-spacing: .22em;
            text-transform: uppercase;
            color: var(--cream-3);
            margin-top: 3px
        }

        .scene {
            position: relative;
            z-index: 1;
            perspective: 1600px;
            perspective-origin: 50% 32%
        }

        .desk {
            position: absolute;
            left: 50%;
            top: 42%;
            width: 170%;
            height: 130%;
            transform: translate(-50%, 0) rotateX(64deg);
            transform-origin: 50% 0;
            z-index: 0;
            pointer-events: none;
            opacity: .7;
            background: radial-gradient(58% 48% at 50% 2%, color-mix(in srgb, var(--signal) 12%, transparent), transparent 68%),
                repeating-linear-gradient(0deg, rgba(236, 229, 214, .05) 0 1px, transparent 1px 48px),
                repeating-linear-gradient(90deg, rgba(236, 229, 214, .05) 0 1px, transparent 1px 48px);
            -webkit-mask-image: linear-gradient(180deg, rgba(0, 0, 0, .85), transparent 82%);
            mask-image: linear-gradient(180deg, rgba(0, 0, 0, .85), transparent 82%)
        }

        .shell {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 312px 1fr;
            gap: clamp(22px, 3vw, 46px);
            max-width: 1240px;
            margin: 0 auto;
            padding: clamp(26px, 3.4vw, 54px) clamp(20px, 3vw, 44px) clamp(40px, 5vw, 90px);
            align-items: start
        }

        .rail {
            position: sticky;
            top: 112px;
            align-self: start;
            display: flex;
            flex-direction: column;
            gap: 20px
        }

        .eyebrow {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: .24em;
            text-transform: uppercase;
            color: var(--cream-3)
        }

        .rail-head {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin: 0 2px 13px
        }

        .rail-head .seq {
            font-family: var(--mono);
            font-size: 9px;
            letter-spacing: .16em;
            color: var(--cream-3);
            opacity: .65
        }

        .stack {
            display: flex;
            flex-direction: column;
            gap: 9px
        }

        .layer {
            position: relative;
            display: grid;
            grid-template-columns: 42px 1fr auto;
            align-items: center;
            gap: 14px;
            width: 100%;
            text-align: left;
            cursor: pointer;
            color: var(--cream);
            padding: 14px 16px 13px 18px;
            border: 1px solid var(--line-d);
            border-radius: 9px;
            background: linear-gradient(180deg, rgba(255, 255, 255, .026), rgba(0, 0, 0, .10));
            transition: transform .26s var(--ease-out), border-color .22s, background .22s, box-shadow .26s
        }

        .layer::before {
            content: "";
            position: absolute;
            left: 0;
            top: 8px;
            bottom: 8px;
            width: 4px;
            border-radius: 4px;
            background: var(--tone);
            opacity: .5;
            transition: .26s
        }

        .layer::after {
            content: "";
            position: absolute;
            left: 1px;
            right: 1px;
            bottom: -4px;
            height: 6px;
            border-radius: 0 0 9px 9px;
            background: linear-gradient(180deg, rgba(0, 0, 0, .32), transparent);
            opacity: .6;
            transition: .26s
        }

        .layer:hover {
            transform: translateY(-3px);
            border-color: rgba(236, 229, 214, .22);
            background: linear-gradient(180deg, rgba(255, 255, 255, .06), rgba(0, 0, 0, .06));
        }

        .layer:hover::before {
            opacity: .85
        }

        .layer.on {
            border-color: color-mix(in srgb, var(--signal) 44%, var(--line-d));
            transform: translateY(-2px);
            background: linear-gradient(100deg, color-mix(in srgb, var(--tone) 18%, transparent), rgba(255, 255, 255, .02) 60%);
        }

        .layer.on::before {
            opacity: 1;
            background: var(--signal);
            box-shadow: 0 0 16px color-mix(in srgb, var(--signal) 70%, transparent)
        }

        .layer-code {
            font-family: var(--mono);
            font-weight: 700;
            font-size: 17px;
            color: var(--tone);
            text-align: center;
            letter-spacing: .02em
        }

        .layer.on .layer-code {
            color: var(--signal-2)
        }

        .layer-name {
            font-family: var(--display);
            font-weight: 650;
            font-size: 14.5px;
            letter-spacing: .004em;
            line-height: 1.08;
            display: block
        }

        .layer-sub {
            font-family: var(--serif);
            font-style: italic;
            font-size: 11.5px;
            color: var(--cream-2);
            margin-top: 3px;
            display: block
        }

        .layer-gauge {
            display: block;
            height: 3px;
            margin-top: 10px;
            background: rgba(236, 229, 214, .1);
            border-radius: 2px;
            overflow: hidden
        }

        .layer-gauge i {
            display: block;
            height: 100%;
            background: var(--tone);
            border-radius: 2px
        }

        .layer-stat {
            font-family: var(--mono);
            font-size: 10.5px;
            color: var(--cream-3);
            letter-spacing: .03em;
            white-space: nowrap
        }

        .layer.core {
            background: linear-gradient(100deg, color-mix(in srgb, var(--signal) 12%, transparent), rgba(255, 255, 255, .02) 70%);
            border-color: color-mix(in srgb, var(--signal) 24%, transparent)
        }

        .layer.core .layer-code {
            color: var(--signal-2);
            font-size: 15px
        }

        .panel {
            position: relative;
            background: linear-gradient(180deg, rgba(36, 32, 24, .7), rgba(20, 18, 13, .7));
            border: 1px solid var(--line-d);
            border-radius: 11px;
            padding: 17px;
            backdrop-filter: blur(8px);
            box-shadow: 0 18px 40px -24px rgba(0, 0, 0, .8)
        }

        .segmented {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 11px
        }

        .seg {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: .03em;
            color: var(--cream-2);
            background: rgba(255, 255, 255, .02);
            border: 1px solid var(--line-d);
            border-radius: 6px;
            padding: 8px 11px;
            cursor: pointer;
            transition: .16s var(--ease-out);
            box-shadow: 0 2px 0 rgba(0, 0, 0, .25)
        }

        .seg:hover {
            color: var(--cream);
            border-color: rgba(236, 229, 214, .3);
            transform: translateY(-1px)
        }

        .seg:active {
            transform: translateY(1px);
            box-shadow: none
        }

        .seg.on {
            color: #1c1305;
            background: linear-gradient(180deg, var(--signal-2), var(--signal));
            border-color: var(--signal);
            box-shadow: 0 8px 18px -9px color-mix(in srgb, var(--signal) 80%, transparent), 0 0 0 1px color-mix(in srgb, var(--signal) 40%, transparent) inset
        }

        .switches {
            margin-top: 16px;
            border-top: 1px solid var(--line-d2);
            padding-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px
        }

        .switch {
            display: flex;
            align-items: center;
            gap: 11px;
            cursor: pointer;
            font-family: var(--serif);
            font-size: 13.5px;
            color: var(--cream-2);
            transition: .16s
        }

        .switch:hover {
            color: var(--cream)
        }

        .switch input {
            appearance: none;
            -webkit-appearance: none;
            width: 37px;
            height: 21px;
            border-radius: 99px;
            background: rgba(236, 229, 214, .12);
            border: 1px solid var(--line-d);
            position: relative;
            cursor: pointer;
            transition: .22s var(--ease);
            flex: 0 0 auto;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, .4)
        }

        .switch input::after {
            content: "";
            position: absolute;
            top: 1.5px;
            left: 2px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--cream-2);
            transition: .24s var(--ease);
            box-shadow: 0 2px 4px rgba(0, 0, 0, .4)
        }

        .switch input:checked {
            background: linear-gradient(180deg, var(--signal-2), var(--signal));
            border-color: var(--signal)
        }

        .switch input:checked::after {
            left: 18px;
            background: #1c1305
        }

        .reset {
            margin: 2px 0 0 2px;
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: .08em;
            color: var(--cream-3);
            background: none;
            border: none;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-color: var(--line-d);
            align-self: flex-start;
            transition: .18s
        }

        .reset:hover {
            color: var(--no);
            text-decoration-color: var(--no)
        }

        .reset.confirming {
            color: var(--no);
            text-decoration-color: var(--no);
            animation: resetPulse 1.1s ease-in-out infinite
        }

        @keyframes resetPulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .45
            }
        }

        .stage {
            min-width: 0
        }

        .tilt-wrap {
            perspective: 1300px;
            perspective-origin: 50% 40%
        }

        .deck {
            position: relative;
            transform-style: preserve-3d;
            will-change: transform;
            animation: deckIn 1s .12s var(--ease-out) backwards
        }

        .sheet-shadow {
            position: absolute;
            left: 7%;
            right: 7%;
            bottom: -4%;
            height: 64px;
            border-radius: 50%;
            z-index: -2;
            background: radial-gradient(50% 50% at 50% 50%, rgba(0, 0, 0, .6), transparent 72%);
            filter: blur(20px);
            transform: translateZ(-90px)
        }

        .sheet-back {
            position: absolute;
            inset: 0;
            z-index: -1;
            background: var(--paper-2);
            border: 1px solid var(--paper-edge);
            border-radius: 3px;
            transform: translate3d(12px, 14px, -12px);
            box-shadow: 0 30px 60px -32px rgba(0, 0, 0, .7)
        }

        .sheet {
            position: relative;
            background: var(--paper);
            color: var(--ink);
            border: 1px solid var(--paper-edge);
            border-radius: 3px;
            overflow: hidden;
            min-height: 452px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--card-shadow);
            transform: translateZ(0);
            padding: clamp(28px, 3.4vw, 46px) clamp(26px, 3.4vw, 48px) clamp(24px, 2.8vw, 40px) clamp(50px, 5vw, 76px);
            background-image: linear-gradient(180deg, rgba(255, 255, 255, .5), rgba(0, 0, 0, .018))
        }

        .sheet::before {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            width: 34px;
            background: linear-gradient(90deg, rgba(26, 23, 18, .06), transparent);
            border-right: 1px dashed var(--line-p2)
        }

        .sheet::after {
            content: "";
            position: absolute;
            left: 13px;
            top: 0;
            bottom: 0;
            width: 10px;
            background-repeat: repeat-y;
            background-position: center 40px;
            background-size: 10px 68px;
            background-image: radial-gradient(circle, rgba(26, 23, 18, .2) 0 3.8px, transparent 4.3px)
        }

        .sheet-inner {
            display: flex;
            flex-direction: column;
            flex: 1;
            animation: pageIn .5s var(--ease-out) both
        }

        .sheet-inner.still {
            animation: none
        }

        .sheet-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 21px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--line-p2)
        }

        .meta-code {
            font-family: var(--mono);
            font-size: 10.5px;
            letter-spacing: .16em;
            text-transform: uppercase;
            color: var(--ink-3)
        }

        .meta-code b {
            color: var(--ink)
        }

        .meta-badge {
            font-family: var(--mono);
            font-size: 9.5px;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--no);
            border: 1px solid color-mix(in srgb, var(--no) 38%, transparent);
            border-radius: 99px;
            padding: 5px 10px
        }

        .meta-fmt {
            margin-left: auto;
            font-family: var(--mono);
            font-size: 9.5px;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--ink-2);
            border: 1px solid var(--line-p);
            border-radius: 99px;
            padding: 6px 12px
        }

        .prompt {
            font-family: var(--serif);
            font-weight: 500;
            font-size: clamp(1.22rem, 2.1vw, 1.56rem);
            line-height: 1.34;
            letter-spacing: -.004em;
            color: var(--ink);
            margin: 0 0 24px;
            max-width: 60ch
        }

        .snippet {
            font-family: var(--mono);
            font-size: 12.5px;
            line-height: 1.6;
            color: #2b2620;
            background: #ECE3D1;
            border: 1px solid var(--paper-edge);
            border-left: 3px solid var(--signal);
            border-radius: 5px;
            padding: 15px 17px;
            white-space: pre;
            overflow-x: auto;
            margin: 0 0 23px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .5), 0 8px 20px -16px rgba(0, 0, 0, .5)
        }

        .choices {
            display: flex;
            flex-direction: column;
            gap: 10px
        }

        .choice {
            position: relative;
            display: flex;
            align-items: flex-start;
            gap: 13px;
            width: 100%;
            text-align: left;
            cursor: pointer;
            font-family: var(--serif);
            font-size: 1.02rem;
            line-height: 1.42;
            color: var(--ink);
            background: linear-gradient(180deg, #F2EBDD, #EBE3D2);
            border: 1px solid var(--paper-edge);
            border-radius: 7px;
            padding: 14px 16px;
            box-shadow: 0 1px 0 rgba(255, 255, 255, .6) inset, 0 3px 0 rgba(26, 23, 18, .08), 0 6px 14px -10px rgba(0, 0, 0, .4);
            transition: transform .15s var(--ease-out), border-color .15s, box-shadow .15s, background .15s
        }

        .choice:hover:not(:disabled) {
            transform: translateY(-2px);
            border-color: color-mix(in srgb, var(--ink) 20%, var(--paper-edge));
            box-shadow: -3px 0 0 0 color-mix(in srgb, var(--signal) 85%, transparent), 0 1px 0 rgba(255, 255, 255, .6) inset, 0 4px 0 rgba(26, 23, 18, .1), 0 12px 22px -12px rgba(0, 0, 0, .45)
        }

        .choice:active:not(:disabled) {
            transform: translateY(1px);
            box-shadow: 0 1px 0 rgba(255, 255, 255, .5) inset, 0 1px 0 rgba(26, 23, 18, .08)
        }

        .choice:disabled {
            cursor: default
        }

        .choice-key {
            font-family: var(--mono);
            font-weight: 700;
            font-size: 12px;
            color: var(--ink-3);
            border: 1px solid var(--line-p);
            border-radius: 5px;
            padding: 3px 8px;
            flex: 0 0 auto;
            line-height: 1.25;
            background: #E6DDC9;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, .1)
        }

        .choice.correct {
            border-color: var(--ok);
            background: linear-gradient(180deg, var(--ok-bg), rgba(66, 112, 76, .07));
            box-shadow: 0 0 0 1px var(--ok) inset, 0 0 26px -6px var(--ok-glow), 0 6px 16px -10px rgba(0, 0, 0, .4);
            animation: pop .4s var(--ease) both
        }

        .choice.correct .choice-key {
            background: var(--ok);
            color: var(--paper);
            border-color: var(--ok)
        }

        .choice.wrong {
            border-color: var(--no);
            background: linear-gradient(180deg, var(--no-bg), rgba(168, 68, 47, .06));
            box-shadow: 0 0 0 1px var(--no) inset, 0 0 22px -8px var(--no-glow)
        }

        .choice.wrong .choice-key {
            background: var(--no);
            color: var(--paper);
            border-color: var(--no)
        }

        .choices.vf {
            flex-direction: row;
            gap: 13px
        }

        .choices.vf .choice {
            flex: 1;
            justify-content: center;
            align-items: center;
            font-family: var(--mono);
            font-weight: 700;
            letter-spacing: .04em;
            padding: 18px
        }

        .feedback {
            margin-top: 21px;
            padding-top: 19px;
            border-top: 1px solid var(--line-p2);
            display: none
        }

        .feedback.show {
            display: block;
            animation: reveal .32s var(--ease-out) both
        }

        .verdict {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: .14em;
            text-transform: uppercase;
            margin-bottom: 13px
        }

        .verdict.ok {
            color: var(--ok)
        }

        .verdict.no {
            color: var(--no)
        }

        .verdict.key {
            color: var(--signal-ink)
        }

        .vmark {
            width: 16px;
            height: 16px;
            flex: 0 0 auto
        }

        .expl {
            font-family: var(--serif);
            font-size: 1rem;
            line-height: 1.56;
            color: var(--ink-2);
            max-width: 62ch
        }

        .keylist {
            list-style: none;
            counter-reset: k;
            margin: 6px 0 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 11px;
            max-width: 64ch
        }

        .keylist li {
            position: relative;
            padding-left: 28px;
            font-family: var(--serif);
            font-size: 1rem;
            line-height: 1.5;
            color: var(--ink-2)
        }

        .keylist li::before {
            content: counter(k, decimal-leading-zero);
            counter-increment: k;
            position: absolute;
            left: 0;
            top: .18em;
            font-family: var(--mono);
            font-weight: 700;
            font-size: 10px;
            letter-spacing: .04em;
            color: var(--signal-ink)
        }

        .reveal {
            font-family: var(--mono);
            font-size: 11.5px;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: #1c1305;
            background: linear-gradient(180deg, var(--signal-2), var(--signal));
            border: none;
            border-radius: 7px;
            padding: 13px 19px;
            cursor: pointer;
            transition: .18s var(--ease-out);
            box-shadow: 0 4px 0 color-mix(in srgb, var(--signal) 80%, black), 0 12px 24px -12px color-mix(in srgb, var(--signal) 80%, transparent)
        }

        .reveal:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 0 color-mix(in srgb, var(--signal) 80%, black), 0 16px 28px -12px color-mix(in srgb, var(--signal) 80%, transparent)
        }

        .reveal:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 color-mix(in srgb, var(--signal) 80%, black)
        }

        .selfgrade {
            display: flex;
            gap: 9px;
            flex-wrap: wrap;
            margin-top: 17px
        }

        .sg {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: .03em;
            color: var(--ink-2);
            background: #E6DDC9;
            border: 1px solid var(--paper-edge);
            border-radius: 7px;
            padding: 10px 14px;
            cursor: pointer;
            transition: .15s var(--ease-out);
            box-shadow: 0 2px 0 rgba(26, 23, 18, .1)
        }

        .sg:hover {
            border-color: color-mix(in srgb, var(--ink) 22%, var(--paper-edge));
            color: var(--ink);
            transform: translateY(-1px)
        }

        .sg:active {
            transform: translateY(1px);
            box-shadow: none
        }

        .sg.know.sel {
            background: var(--ok);
            color: var(--paper);
            border-color: var(--ok)
        }

        .sg.almost.sel {
            background: var(--signal);
            color: #1c1305;
            border-color: var(--signal)
        }

        .sg.review.sel {
            background: var(--no);
            color: var(--paper);
            border-color: var(--no)
        }

        .selfnote {
            font-family: var(--serif);
            font-style: italic;
            font-size: 12.5px;
            color: var(--ink-3);
            margin-top: 12px;
            max-width: 60ch
        }

        .pager {
            margin-top: auto;
            padding-top: 23px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-top: 1px solid var(--line-p2)
        }

        .pager-count {
            margin: 0 auto;
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: .12em;
            color: var(--ink-3)
        }

        .pager-count b {
            color: var(--ink)
        }

        .pgbtn {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--ink);
            background: linear-gradient(180deg, #F2EBDD, #E9E1D0);
            border: 1px solid var(--paper-edge);
            border-radius: 7px;
            padding: 11px 16px;
            cursor: pointer;
            transition: .15s var(--ease-out);
            box-shadow: 0 3px 0 rgba(26, 23, 18, .1), 0 6px 14px -10px rgba(0, 0, 0, .4)
        }

        .pgbtn:hover:not(:disabled) {
            transform: translateY(-1px);
            border-color: color-mix(in srgb, var(--ink) 24%, var(--paper-edge));
            box-shadow: 0 4px 0 rgba(26, 23, 18, .1), 0 10px 18px -10px rgba(0, 0, 0, .45)
        }

        .pgbtn:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 1px 0 rgba(26, 23, 18, .1)
        }

        .pgbtn:disabled {
            opacity: .38;
            cursor: default
        }

        .empty {
            margin: auto;
            text-align: center;
            max-width: 360px;
            padding: 46px 0
        }

        .empty b {
            font-family: var(--display);
            font-weight: 650;
            font-size: 1.24rem;
            color: var(--ink);
            display: block;
            margin-bottom: 9px
        }

        .empty span {
            font-family: var(--serif);
            color: var(--ink-3);
            line-height: 1.55
        }

        .kbd {
            margin: 18px 2px 0;
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: .08em;
            color: var(--cream-3);
            text-align: center
        }

        /* --- STILI CREDITI CON ICONE SVG --- */
        .site-credits {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 16px;
            padding: 40px 20px 20px;
            font-family: var(--mono);
            font-size: 11.5px;
            letter-spacing: .04em;
            color: var(--cream-3);
            position: relative;
            z-index: 10;
        }

        .site-credits span {
            opacity: 0.6;
        }

        .site-credits a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--signal);
            text-decoration: none;
            transition: 0.2s ease;
        }

        .site-credits a svg {
            width: 15px;
            height: 15px;
            fill: currentColor;
            display: block;
        }

        .site-credits a:hover {
            color: var(--signal-2);
            transform: translateY(-1px);
        }

        @media (max-width:900px) {
            .shell {
                grid-template-columns: 1fr;
                gap: 18px;
                padding-top: 24px
            }

            .rail {
                position: static;
                top: auto
            }

            .stack {
                flex-direction: row;
                overflow-x: auto;
                gap: 9px;
                padding-bottom: 8px;
                scrollbar-width: thin
            }

            .layer {
                min-width: 240px;
                flex: 0 0 auto
            }

            .deck {
                animation-duration: .6s
            }
        }

        @media (max-width:560px) {
            .gauge {
                width: 88px;
                height: 88px
            }

            .dial-read span {
                font-size: 1.1rem
            }

            .desk {
                display: none
            }

            .sheet {
                padding-left: 44px
            }

            .sheet::after {
                left: 11px
            }

            .title h1 {
                font-size: 1.7rem
            }
        }

        :focus-visible {
            outline: 2px solid var(--signal);
            outline-offset: 3px;
            border-radius: 6px
        }

        @keyframes deckIn {
            from {
                transform: translate3d(0, 60px, 200px) rotateX(15deg);
                opacity: 0
            }
        }

        @keyframes pageIn {
            from {
                opacity: 0;
                transform: translateY(10px)
            }
        }

        @keyframes pop {
            0% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.02)
            }

            100% {
                transform: scale(1)
            }
        }

        @keyframes reveal {
            from {
                opacity: 0;
                transform: translateY(-8px)
            }
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(15px)
            }
        }
    </style>
</head>

<body>
    <canvas id="net" aria-hidden="true"></canvas>
    <div class="grid" aria-hidden="true"></div>
    <div class="ambient" aria-hidden="true"></div>

    <header class="masthead">
        <div class="masthead-in">
            <div class="brand">
                <span class="mark"><svg width="32" height="36" viewBox="0 0 32 36" fill="none" aria-hidden="true">
                        <rect x="3" y="3" width="26" height="6.5" rx="2" stroke="var(--signal-2)" stroke-width="1.7" />
                        <rect x="3" y="14" width="26" height="6.5" rx="2" stroke="var(--cream)" stroke-width="1.5"
                            opacity=".78" />
                        <rect x="3" y="25" width="26" height="6.5" rx="2" stroke="var(--cream)" stroke-width="1.5"
                            opacity=".5" />
                    </svg></span>
                <span class="title">
                    <span class="kick">Generatore Autonomo</span>
                    <h1>Quiz App</h1>
                    <span class="sub">Trainer didattico personalizzato</span>
                </span>
            </div>
            <div class="gauge">
                <svg class="dial" viewBox="0 0 120 120" aria-hidden="true">
                    <circle cx="60" cy="60" r="38" fill="none" stroke="rgba(236,229,214,.1)" stroke-width="1"
                        stroke-dasharray="2 6" />
                    <circle cx="60" cy="60" r="46" fill="none" stroke="rgba(236,229,214,.12)" stroke-width="7"
                        stroke-linecap="round" stroke-dasharray="216.77 400" transform="rotate(135 60 60)" />
                    <circle id="readyArc" cx="60" cy="60" r="46" fill="none" stroke="url(#dg)" stroke-width="7"
                        stroke-linecap="round" stroke-dasharray="289.027" stroke-dashoffset="289.027"
                        transform="rotate(135 60 60)" style="transition:stroke-dashoffset .7s var(--ease)" />
                    <defs>
                        <linearGradient id="dg" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0" stop-color="var(--signal)" />
                            <stop offset="1" stop-color="var(--signal-2)" />
                        </linearGradient>
                    </defs>
                </svg>
                <div class="dial-read"><span id="readyPct">0%</span><small>pronto</small></div>
            </div>
        </div>
    </header>

    <div class="scene">
        <div class="desk" aria-hidden="true"></div>
        <div class="shell">
            <aside class="rail">
                <div>
                    <div class="rail-head"><span class="eyebrow">Sezioni</span><span class="seq">argomenti</span></div>
                    <nav class="stack" id="stack"></nav>
                </div>
                <div class="panel">
                    <span class="eyebrow">Formato</span>
                    <div class="segmented" id="fmtChips"></div>
                    <div class="switches">
                        <label class="switch"><input type="checkbox" id="togReview"><span>Solo da
                                rivedere</span></label>
                        <label class="switch"><input type="checkbox" id="togShuffle"><span>Mescola
                                l'ordine</span></label>
                        <button class="reset" id="resetBtn">azzera i progressi</button>
                    </div>
                </div>
            </aside>
            <main class="stage">
                <div class="tilt-wrap">
                    <div class="deck" id="deck">
                        <div class="sheet-shadow" aria-hidden="true"></div>
                        <div class="sheet-back" aria-hidden="true"></div>
                        <article class="sheet" id="card"></article>
                    </div>
                </div>
                <p class="kbd">← → naviga · 1–4 / V F rispondi · barra spazio rivela</p>
            </main>
        </div>
    </div>

    <!-- SEZIONE CREDITI CON ICONE SVG -->


    <script src="data.js"></script>
    <script>
        const FMT = [["all", "Tutti"], ["vf", "V/F"], ["mc", "Scelta multipla"], ["open", "Aperte"], ["code", "Codice"]];
        const FMTLABEL = { vf: "Vero / Falso", mc: "Scelta multipla", open: "Domanda aperta", code: "Codice" };

        const S = { chapter: "all", fmt: "all", review: false, shuffle: false, idx: 0, pool: [], _lastId: null };
        let progress = {};
        const KEY = "quiz_trainer_v1";
        function load() { try { const r = localStorage.getItem(KEY); if (r) progress = JSON.parse(r) || {}; } catch (e) { } }
        function save() { try { localStorage.setItem(KEY, JSON.stringify(progress)); } catch (e) { } }
        load();

        const $ = s => document.querySelector(s);
        function shuffle(a) { a = a.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]]; } return a; }
        function isReview(id) { const p = progress[id]; return p && p.answered && (p.correct === false || p.self === "review" || p.self === "almost"); }

        function buildPool() {
            let p = BANK.filter(q => (S.chapter === "all" || q.ch === S.chapter) && (S.fmt === "all" || q.fmt === S.fmt));
            if (S.review) p = p.filter(q => isReview(q.id));
            if (S.shuffle) p = shuffle(p);
            S.pool = p; S.idx = 0;
        }
        function chapterStats(ch) {
            const qs = BANK.filter(q => q.ch === ch); let ans = 0, ok = 0;
            qs.forEach(q => { const pr = progress[q.id]; if (pr && pr.answered) { ans++; if (pr.correct) ok++; } }); return { tot: qs.length, ans, ok };
        }
        function overall() { let ans = 0, ok = 0; BANK.forEach(q => { const pr = progress[q.id]; if (pr && pr.answered) { ans++; if (pr.correct) ok++; } }); return { tot: BANK.length, ans, ok }; }

        function renderStack() {
            const el = $("#stack"); el.innerHTML = "";
            const o = overall();
            const all = document.createElement("button");
            all.className = "layer core" + (S.chapter === "all" ? " on" : "");
            all.style.setProperty("--tone", "var(--signal)");
            all.innerHTML = `<span class="layer-code">&#931;</span><span><span class="layer-name">Tutto il programma</span>
    <span class="layer-sub">Ripasso totale · ${o.tot} quesiti</span>
    <span class="layer-gauge"><i style="width:${o.tot ? Math.round(o.ans / o.tot * 100) : 0}%"></i></span></span>
    <span class="layer-stat">${o.ans}/${o.tot}</span>`;
            all.onclick = () => { S.chapter = "all"; buildPool(); renderAll(); };
            el.appendChild(all);
            if (typeof META !== 'undefined') {
                META.forEach(m => {
                    const st = chapterStats(m.ch);
                    const b = document.createElement("button");
                    b.className = "layer" + (S.chapter === m.ch ? " on" : "");
                    b.style.setProperty("--tone", m.tone);
                    b.innerHTML = `<span class="layer-code">${m.num}</span><span><span class="layer-name">${m.nm}</span>
        <span class="layer-sub">${m.sb}</span>
        <span class="layer-gauge"><i style="width:${st.tot ? Math.round(st.ans / st.tot * 100) : 0}%"></i></span></span>
        <span class="layer-stat">${st.ans}/${st.tot}</span>`;
                    b.onclick = () => { S.chapter = m.ch; buildPool(); renderAll(); };
                    el.appendChild(b);
                });
            }
        }
        function renderChips() {
            const el = $("#fmtChips"); el.innerHTML = "";
            FMT.forEach(([v, l]) => {
                const c = document.createElement("button");
                c.className = "seg" + (S.fmt === v ? " on" : ""); c.textContent = l;
                c.onclick = () => { S.fmt = v; buildPool(); renderAll(); }; el.appendChild(c);
            });
        }
        function renderMeter() {
            const o = overall(); const pct = o.tot ? Math.round(o.ans / o.tot * 100) : 0;
            $("#readyPct").textContent = pct + "%";
            const arc = document.getElementById("readyArc");
            if (arc) { const C = 289.027, L = 216.77; arc.style.strokeDashoffset = (C - (pct / 100) * L).toFixed(1); }
        }

        function setAns(id, correct, extra) {
            progress[id] = Object.assign({ answered: true, correct: !!correct }, extra || {});
            save(); renderStack(); renderMeter();
        }

        function verdictHTML(ok) {
            const mk = ok
                ? '<svg class="vmark" viewBox="0 0 18 18" fill="none"><path d="M3.5 9.4l3.3 3.5L14.6 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>'
                : '<svg class="vmark" viewBox="0 0 18 18" fill="none"><path d="M5 5l8 8M13 5l-8 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';
            return `<div class="verdict ${ok ? "ok" : "no"}">${mk}${ok ? "corretto" : "sbagliato"}</div>`;
        }
        function escapeHTML(s) { return (s == null ? "" : String(s)).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

        function renderCard() {
            const card = $("#card");
            if (!S.pool.length) {
                card.innerHTML = `<div class="sheet-inner still"><div class="empty"><b>Niente qui</b><span>${S.review ? "Nessun elemento contrassegnato da rivedere." : "Nessuna domanda trovata per questi filtri."}</span></div></div>`;
                S._lastId = null; return;
            }
            if (S.idx < 0) S.idx = 0; if (S.idx >= S.pool.length) S.idx = S.pool.length - 1;
            const q = S.pool[S.idx]; const pr = progress[q.id] || {};
            const m = (typeof META !== 'undefined') ? META.find(x => x.ch === q.ch) || { num: "-", nm: "Capitolo", tone: "#888" } : { num: "-", nm: "Capitolo", tone: "#888" };
            const fresh = (S._lastId !== q.id); S._lastId = q.id;
            let h = `<div class="sheet-meta">
    <span class="meta-code"><b>${m.num}</b> · ${m.nm.toUpperCase()}</span>
    ${isReview(q.id) ? '<span class="meta-badge">da rivedere</span>' : ''}
    <span class="meta-fmt">${FMTLABEL[q.fmt]}</span></div>
    <p class="prompt">${escapeHTML(q.q)}</p>`;
            if (q.code) h += `<pre class="snippet">${escapeHTML(q.code)}</pre>`;

            if (q.fmt === "vf") {
                const a = pr.answered;
                const cls = v => { if (!a) return ""; if (v === q.correct) return " correct"; if (pr.pick === v) return " wrong"; return ""; };
                h += `<div class="choices vf">
      <button class="choice${cls(true)}" data-v="true" ${a ? "disabled" : ""}><span class="choice-key">V</span>Vero</button>
      <button class="choice${cls(false)}" data-v="false" ${a ? "disabled" : ""}><span class="choice-key">F</span>Falso</button></div>`;
                h += `<div class="feedback${a ? " show" : ""}">${a ? verdictHTML(pr.correct) + `<div class="expl">${escapeHTML(q.explain)}</div>` : ""}</div>`;
            } else if (q.fmt === "mc") {
                const a = pr.answered; const L = ["A", "B", "C", "D", "E"];
                h += `<div class="choices">`;
                q.opts.forEach((o, i) => {
                    let c = ""; if (a) { if (i === q.correct) c = " correct"; else if (pr.pick === i) c = " wrong"; }
                    h += `<button class="choice${c}" data-i="${i}" ${a ? "disabled" : ""}><span class="choice-key">${L[i]}</span><span>${escapeHTML(o)}</span></button>`;
                });
                h += `</div><div class="feedback${a ? " show" : ""}">${a ? verdictHTML(pr.correct) + `<div class="expl">${escapeHTML(q.explain)}</div>` : ""}</div>`;
            } else {
                if (!pr.revealed) {
                    h += `<button class="reveal" id="revealBtn">Mostra i punti chiave</button>`;
                } else {
                    h += `<div class="feedback show">
        <div class="verdict key"><svg class="vmark" viewBox="0 0 18 18" fill="none"><path d="M7 3.5H4.5v11H7M11 3.5h2.5v11H11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>punti chiave</div>
        <ul class="keylist">${q.points.map(p => `<li>${escapeHTML(p)}</li>`).join("")}</ul>
        <div class="selfgrade">
          <button class="sg know${pr.self === "know" ? " sel" : ""}" data-s="know">la sapevo</button>
          <button class="sg almost${pr.self === "almost" ? " sel" : ""}" data-s="almost">quasi</button>
          <button class="sg review${pr.self === "review" ? " sel" : ""}" data-s="review">da rivedere</button>
        </div></div>`;
                }
            }

            h += `<div class="pager">
    <button class="pgbtn" id="prevBtn" ${S.idx === 0 ? "disabled" : ""}>← indietro</button>
    <span class="pager-count"><b>${S.idx + 1}</b> / ${S.pool.length}</span>
    <button class="pgbtn" id="nextBtn" ${S.idx === S.pool.length - 1 ? "disabled" : ""}>avanti →</button></div>`;
            card.innerHTML = `<div class="sheet-inner${fresh ? "" : " still"}">${h}</div>`;

            card.querySelectorAll(".choice").forEach(b => {
                if (b.dataset.v !== undefined) b.onclick = () => { const v = b.dataset.v === "true"; setAns(q.id, v === q.correct, { pick: v }); renderCard(); };
                else if (b.dataset.i !== undefined) b.onclick = () => { const i = +b.dataset.i; setAns(q.id, i === q.correct, { pick: i }); renderCard(); };
            });
            const rb = card.querySelector("#revealBtn");
            if (rb) rb.onclick = () => { progress[q.id] = Object.assign({}, progress[q.id], { revealed: true }); save(); renderCard(); };
            card.querySelectorAll(".sg").forEach(b => b.onclick = () => { const s = b.dataset.s; setAns(q.id, s === "know", { revealed: true, self: s }); renderCard(); });
            const pv = card.querySelector("#prevBtn"), nx = card.querySelector("#nextBtn");
            if (pv) pv.onclick = () => { S.idx--; renderCard(); };
            if (nx) nx.onclick = () => { S.idx++; renderCard(); };
        }
        function renderAll() { renderStack(); renderChips(); renderMeter(); renderCard(); }

        $("#togReview").onchange = e => { S.review = e.target.checked; buildPool(); renderCard(); renderStack(); };
        $("#togShuffle").onchange = e => { S.shuffle = e.target.checked; buildPool(); renderCard(); };
        $("#resetBtn").onclick = function () {
            if (!this.classList.contains("confirming")) {
                this.classList.add("confirming");
                this.dataset.label = this.textContent;
                this.textContent = "sicuro? clicca di nuovo";
                clearTimeout(this._t);
                this._t = setTimeout(() => { this.classList.remove("confirming"); this.textContent = this.dataset.label; }, 3000);
                return;
            }
            clearTimeout(this._t);
            this.classList.remove("confirming");
            this.textContent = this.dataset.label;
            progress = {}; save();
            $("#togReview").checked = false; $("#togShuffle").checked = false; S.review = false; S.shuffle = false; buildPool(); renderAll();
        };

        document.addEventListener("keydown", e => {
            if (["INPUT", "TEXTAREA"].includes(document.activeElement.tagName)) return;
            if (!S.pool.length) return;

                    const x = p.a.x + (p.b.x - p.a.x) * p.t, y = p.a.y + (p.b.y - p.a.y) * p.t;
                    const g = ctx.createRadialGradient(x, y, 0, x, y, 8); g.addColorStop(0, "rgba(214,178,120,.5)"); g.addColorStop(1, "transparent");
                    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, 8, 0, 7); ctx.fill();
                    ctx.fillStyle = "rgba(255,255,255,.8)"; ctx.beginPath(); ctx.arc(x, y, 1.4, 0, 7); ctx.fill();
                }

            }
            function start() { cancelAnimationFrame(raf); if (REDUCE) { ctx.clearRect(0, 0, W, H); links(); dots(.45); } else frame(); }
            init(); start(); let rt; window.addEventListener("resize", () => { clearTimeout(rt); rt = setTimeout(() => { init(); start(); }, 200); });
        })();

        (function () {
            if (REDUCE || !FINE) return;
            const deck = document.getElementById("deck");
            let tx = 0, ty = 0, cx = 0, cy = 0, lz = 0, hover = false; const lerp = (a, b, n) => a + (b - a) * n;
            window.addEventListener("mousemove", e => { tx = (e.clientX / window.innerWidth - .5) * 1.5; ty = (e.clientY / window.innerHeight - .5) * 1.5; }, { passive: true });
